name: Fetch kintone data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch records from kintone
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "今日の日付: $TODAY"
          QUERY="date >= \"$TODAY\" order by date asc, start_time asc limit 500"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$QUERY'))")
          echo "クエリ: $QUERY"
          curl -s \
            -H "X-Cybozu-API-Token: ${{ secrets.KINTONE_API_TOKEN }}" \
            "https://dj4b0bjck6k2.cybozu.com/k/v1/records.json?app=394&query=$ENCODED" \
            -o data.json
          echo "取得件数:"
          python3 -c "import json; d=json.load(open('data.json')); print(len(d['records']), '件')"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "変更なし" || (git commit -m "chore: update kintone data [skip ci]" && git push && echo "プッシュ完了")
